<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
body {
  width: 720pt;
  height: 405pt;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  font-family: Arial, sans-serif;
  background-color: #FFFFFF;
  box-sizing: border-box;
}
h2 {
  color: #292929;
  font-size: 32pt;
  font-weight: bold;
  margin: 36pt 50pt 24pt 50pt;
  text-transform: uppercase;
  letter-spacing: 2pt;
}
</style>
</head>
<body>
<h2>Orchestrator, Not Generator</h2>
<div style="position: absolute; top: 100pt; left: 50pt; width: 280pt; bottom: 80pt;">
  <div style="background-color: #F5F5F5; padding: 20pt; height: 180pt; border-top: 4pt solid #CCCBCB;">
    <p style="color: #888888; font-size: 12pt; font-weight: bold; text-transform: uppercase; letter-spacing: 1pt; margin: 0 0 12pt 0;">Chat and Generate</p>
    <ul style="color: #292929; font-size: 13pt; margin: 0; padding-left: 18pt; line-height: 1.6;">
      <li>Inconsistency</li>
      <li>Context loss</li>
      <li>No quality gates</li>
      <li>Constant rework</li>
    </ul>
  </div>
</div>
<div style="position: absolute; top: 100pt; right: 50pt; width: 280pt; bottom: 80pt;">
  <div style="background-color: #292929; padding: 20pt; height: 180pt; border-top: 4pt solid #E33737;">
    <p style="color: #E33737; font-size: 12pt; font-weight: bold; text-transform: uppercase; letter-spacing: 1pt; margin: 0 0 12pt 0;">Direct a Process</p>
    <ul style="color: #FFFFFF; font-size: 13pt; margin: 0; padding-left: 18pt; line-height: 1.6;">
      <li>Consistent workflow</li>
      <li>Quality built in</li>
      <li>Human oversight</li>
      <li>Predictable output</li>
    </ul>
  </div>
</div>
<div style="position: absolute; bottom: 40pt; left: 50pt; right: 50pt;">
  <p style="color: #292929; font-size: 14pt; font-weight: bold; margin: 0;">You orchestrate the process. Claude Code executes it.</p>
</div>
</body>
</html>
